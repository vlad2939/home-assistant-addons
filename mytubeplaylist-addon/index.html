<!DOCTYPE html>
<html lang="ro" class="dark">
<head>
    <meta charset="utf-8">
    <title>YT Dashboard</title>
    <!-- CRITIC: Previne trimiterea URL-ului intern Home Assistant Ingress
         (/api/hassio_ingress/<token>/) către YouTube ca Referer header.
         Fără acest tag, YouTube returnează Error 153 (player config error)
         deoarece consideră originea nevalidă. -->
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: { 900: '#18181b', 800: '#27272a', 700: '#3f3f46' }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        blob: "blob 10s infinite alternate",
                        'slide-up': "slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        'pulse-slow': "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%":   { transform: "translate(0px, 0px) scale(1)" },
                            "33%":  { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%":  { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        },
                        slideUp: {
                            "0%":   { opacity: 0, transform: "translateY(20px)" },
                            "100%": { opacity: 1, transform: "translateY(0)" }
                        }
                    }
                }
            }
        };

        // Temă rapidă înainte de render — fără flash
        (function() {
            const saved = localStorage.getItem('ytdash-theme');
            if (saved === 'light' || (!saved && window.matchMedia('(prefers-color-scheme: light)').matches)) {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>

<body class="bg-zinc-100 dark:bg-[#0a0604] text-zinc-900 dark:text-zinc-100
             flex h-screen overflow-hidden antialiased
             selection:bg-orange-500/30 selection:text-black dark:selection:text-white
             transition-colors duration-500 relative">

    <!-- Animated background blobs: Light cyan/sky/teal — Dark yellow/amber/orange -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-cyan-400/30 dark:bg-yellow-500/20 blur-[100px] animate-blob mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000"></div>
        <div class="absolute top-[20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-sky-400/30 dark:bg-amber-500/20 blur-[120px] animate-blob mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000" style="animation-delay:2s"></div>
        <div class="absolute bottom-[-20%] left-[10%] w-[40%] h-[40%] rounded-full bg-teal-400/30 dark:bg-orange-500/20 blur-[100px] animate-blob mix-blend-multiply dark:mix-blend-screen transition-colors duration-1000" style="animation-delay:4s"></div>
    </div>

    <!-- Layout wrapper: padding + gap = panouri flotante -->
    <div class="relative z-10 flex h-screen p-4 lg:p-6 gap-6 w-full max-w-[1800px] mx-auto overflow-hidden">

        <!-- Mobile overlay -->
        <div id="sidebarOverlay"
             class="fixed inset-0 bg-black/60 backdrop-blur-md z-30 hidden opacity-0
                    transition-opacity duration-300 lg:hidden"></div>

        <!-- ════════════════════════════════════════
             SIDEBAR — panou glass flotant
        ════════════════════════════════════════ -->
        <aside id="sidebar"
               class="w-[260px] bg-white/70 dark:bg-black/40 backdrop-blur-2xl
                      border border-white/50 dark:border-white/10 rounded-3xl
                      flex flex-col shrink-0
                      shadow-[0_8px_32px_rgba(0,0,0,0.05)] dark:shadow-[0_8px_32px_rgba(0,0,0,0.3)]
                      z-40 absolute lg:relative
                      h-[calc(100%-2rem)] lg:h-full
                      transition-transform duration-300
                      -translate-x-[110%] lg:translate-x-0
                      overflow-hidden">

            <!-- Brand header -->
            <div class="h-20 flex items-center px-6
                        border-b border-zinc-200/50 dark:border-white/5
                        transition-colors duration-300 backdrop-blur-md flex-shrink-0">
                <div class="flex items-center gap-3 font-bold text-[18px] tracking-tight
                            text-zinc-900 dark:text-white cursor-default">
                    <div class="w-8 h-8 rounded-xl bg-zinc-900 dark:bg-white
                                flex items-center justify-center
                                shadow-lg shadow-orange-500/20
                                transition-all duration-300 hover:scale-105 hover:rotate-3">
                        <span class="material-icons-round text-white dark:text-black text-[18px] translate-x-[1px]">play_arrow</span>
                    </div>
                    YT Dashboard
                </div>
                <!-- Buton închidere mobile -->
                <button id="closeSidebarBtn"
                        class="lg:hidden ml-auto text-zinc-400 hover:text-zinc-900 dark:hover:text-white
                               bg-black/5 dark:bg-white/5 p-2 rounded-full backdrop-blur-md
                               transition-colors duration-200">
                    <span class="material-icons-round text-[18px]">close</span>
                </button>
            </div>

            <!-- Theme toggle + Search -->
            <div class="px-5 pt-6 pb-4 flex-shrink-0">
                <!-- Theme pill toggle -->
                <div class="flex items-center justify-between mb-5 px-1">
                    <span class="text-[14px] font-bold text-zinc-500 dark:text-zinc-400
                                 uppercase tracking-widest select-none">Temă</span>
                    <button id="themeToggle"
                            aria-label="Schimbă tema"
                            class="relative inline-flex h-6 w-11 items-center rounded-full
                                   bg-zinc-200 dark:bg-white/10 transition-colors duration-300
                                   focus:outline-none hover:ring-2 hover:ring-orange-500/50">
                        <span class="inline-block h-4 w-4 transform rounded-full
                                     bg-white dark:bg-zinc-300 shadow-sm
                                     transition-transform duration-300
                                     translate-x-1 dark:translate-x-6"></span>
                    </button>
                </div>
                <!-- Search -->
                <div class="relative group">
                    <span class="material-icons-round absolute left-4 top-1/2 -translate-y-[45%]
                                 text-zinc-400 dark:text-zinc-500 text-[18px]
                                 group-focus-within:text-orange-600 dark:group-focus-within:text-orange-500
                                 transition-colors pointer-events-none">search</span>
                    <input id="searchInput" type="text" placeholder="Caută ceva..."
                           spellcheck="false" autocomplete="off"
                           class="w-full bg-white/50 dark:bg-white/5
                                  border border-zinc-200 dark:border-white/10
                                  rounded-2xl pl-11 pr-4 py-3.5
                                  text-zinc-900 dark:text-white
                                  placeholder-zinc-500 dark:placeholder-zinc-500
                                  focus:bg-white dark:focus:bg-white/10
                                  focus:border-orange-500/50 focus:ring-2 focus:ring-orange-500/20
                                  transition-all text-[14px] outline-none shadow-sm backdrop-blur-sm" />
                </div>
            </div>

            <!-- Playlist navigation -->
            <nav id="sidebarNav"
                 class="flex-1 overflow-y-auto px-4 space-y-1.5 custom-scrollbar pb-4 relative z-10"></nav>

            <!-- Bottom toolbar -->
            <div class="px-4 pb-5 pt-4 border-t border-zinc-200/50 dark:border-white/5
                        bg-white/30 dark:bg-black/20 backdrop-blur-md
                        transition-colors duration-300 flex-shrink-0 space-y-1.5">

                <!-- Load Data -->
                <button id="loadDataBtn"
                        type="button"
                        class="w-full flex items-center gap-2.5 px-4 py-3
                               hover:bg-white dark:hover:bg-white/10 rounded-2xl transition-all
                               text-zinc-500 dark:text-zinc-400
                               hover:text-zinc-900 dark:hover:text-white
                               text-xs font-semibold tracking-wide select-none
                               shadow-sm hover:shadow-md
                               border border-transparent hover:border-zinc-200 dark:hover:border-white/10
                               focus:outline-none focus:ring-2 focus:ring-orange-500/50 group">
                    <span class="material-icons-round text-[16px] opacity-50 group-hover:opacity-100 group-hover:text-orange-500 transition-all">folder_open</span>
                    <span>Load Data</span>
                    <span id="activeFileName"
                          class="ml-auto font-mono text-[10px] text-zinc-400 dark:text-zinc-600
                                 truncate max-w-[80px]">data.json</span>
                </button>

                <!-- JSON Builder -->
                <a href="builder.html"
                   class="w-full flex items-center gap-2.5 px-4 py-3
                          hover:bg-white dark:hover:bg-white/10 rounded-2xl transition-all
                          text-zinc-500 dark:text-zinc-400
                          hover:text-zinc-900 dark:hover:text-white
                          text-xs font-semibold tracking-wide select-none
                          shadow-sm hover:shadow-md
                          border border-transparent hover:border-zinc-200 dark:hover:border-white/10
                          focus:outline-none focus:ring-2 focus:ring-orange-500/50 group">
                    <span class="material-icons-round text-[16px] opacity-50 group-hover:opacity-100 group-hover:text-orange-500 transition-all">construction</span>
                    <span>JSON Builder</span>
                    <span class="ml-auto font-mono text-[9px] px-1.5 py-0.5 rounded
                                 bg-orange-500/10 text-orange-500 border border-orange-500/20">Tool</span>
                </a>

                <!-- Stats + Theme icon (desktop fallback) -->
                <div class="flex items-center justify-between pt-1">
                    <div id="statsLabel"
                         class="text-[11px] text-zinc-400 dark:text-zinc-600 font-mono"></div>
                    <span id="themeIcon" class="hidden"></span>
                </div>

            </div>
        </aside>

        <!-- ════════════════════════════════════════
             MAIN PANEL — panou glass flotant
        ════════════════════════════════════════ -->
        <main class="flex-1 flex flex-col bg-white/70 dark:bg-black/40 backdrop-blur-2xl
                     border border-white/50 dark:border-white/10 rounded-3xl overflow-hidden
                     shadow-[0_8px_32px_rgba(0,0,0,0.05)] dark:shadow-[0_8px_32px_rgba(0,0,0,0.3)]
                     relative transition-all duration-300">

            <!-- Mobile header -->
            <div class="lg:hidden w-full flex items-center justify-between px-5 py-4
                        bg-white/40 dark:bg-black/40 backdrop-blur-xl
                        border-b border-zinc-200/50 dark:border-white/5
                        sticky top-0 z-20 flex-shrink-0">
                <div class="flex items-center gap-2.5 font-bold text-[16px] tracking-tight
                            text-zinc-900 dark:text-white">
                    <div class="w-8 h-8 rounded-xl bg-zinc-900 dark:bg-white
                                flex items-center justify-center shadow-lg shadow-orange-500/20">
                        <span class="material-icons-round text-white dark:text-black text-[18px] translate-x-[1px]">play_arrow</span>
                    </div>
                    YT Dashboard
                </div>
                <button id="menuToggle"
                        class="w-10 h-10 flex items-center justify-center rounded-2xl
                               bg-white/50 dark:bg-white/5
                               text-zinc-600 dark:text-zinc-400
                               hover:text-zinc-900 dark:hover:text-white
                               transition-all border border-zinc-200/50 dark:border-white/10
                               shadow-sm backdrop-blur-sm
                               focus:outline-none focus:ring-2 focus:ring-orange-500/50">
                    <span class="material-icons-round text-[20px]">menu</span>
                </button>
            </div>

            <!-- Desktop title bar -->
            <div class="hidden lg:flex items-end justify-between
                        px-10 pt-8 pb-5
                        border-b border-zinc-200/50 dark:border-white/5
                        flex-shrink-0 transition-colors duration-300">
                <div>
                    <h1 id="pageTitle"
                        class="text-3xl md:text-5xl font-bold tracking-tight
                               text-zinc-900 dark:text-white transition-colors duration-300
                               drop-shadow-sm dark:drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                        Toate Playlist-urile
                    </h1>
                    <p id="pageSubtitle"
                       class="text-[13px] text-zinc-500 dark:text-zinc-400 mt-1.5 font-medium"></p>
                </div>
                <button id="backBtn"
                        class="hidden items-center gap-2 px-4 py-2 rounded-xl
                               text-zinc-600 dark:text-zinc-400
                               hover:text-zinc-900 dark:hover:text-white
                               hover:bg-white/50 dark:hover:bg-white/10
                               shadow-sm hover:shadow-md text-sm font-semibold
                               border border-transparent hover:border-zinc-300 dark:hover:border-white/10
                               backdrop-blur-md transition-all duration-200
                               focus:outline-none focus:ring-2 focus:ring-orange-500/50">
                    <span class="material-icons-round text-[18px]">arrow_back</span>
                    Înapoi
                </button>
            </div>

            <!-- Content canvas -->
            <div id="contentCanvas"
                 class="flex-1 overflow-y-auto custom-scrollbar
                        px-6 lg:px-10 pb-10 pt-6 relative z-10 animate-slide-up"></div>
        </main>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay"
         class="fixed inset-0 z-50 flex flex-col items-center justify-center
                bg-zinc-100/90 dark:bg-[#0a0604]/90 backdrop-blur-2xl
                transition-opacity duration-500">
        <div class="w-12 h-12 rounded-2xl bg-zinc-900 dark:bg-white
                    flex items-center justify-center
                    shadow-xl shadow-orange-500/20 animate-bounce mb-5
                    transition-colors duration-300">
            <span class="material-icons-round text-white dark:text-black text-[26px] translate-x-[1px]">play_arrow</span>
        </div>
        <p class="text-[14px] font-semibold text-zinc-500 dark:text-zinc-400 tracking-wide">
            Se încarcă…
        </p>
    </div>

    <!--
        fileInput TREBUIE să fie direct în <body>, complet în afara oricărui
        container cu overflow:hidden. Browserele (Chrome/Safari) blochează
        .click() programatic pe input[type=file] aflat în overflow:hidden.
    -->
    <input id="fileInput" type="file" accept=".json,application/json"
           style="position:fixed;top:-999px;left:-999px;width:1px;height:1px;opacity:0;pointer-events:none;"
           tabindex="-1" />

    <script src="app.js"></script>
</body>
</html>
